target-version = "py311"
src = ["src"]
line-length = 120
include = ["*.py", "*.pyi"]
fix = true

exclude = [
    ".bzr", ".direnv", ".eggs", ".git", ".git-rewrite", ".hg",
    ".mypy_cache", ".nox", ".pants.d", ".pytype", ".ruff_cache",
    ".svn", ".tox", ".venv", "__pypackages__", "_build", "buck-out",
    "build", "dist", "node_modules", "venv",
]

[lint]
select = [
    "E",
    "F",
    "UP",
    "B",
    "SIM",
    "I",
    "N",
    "ISC",
    "PTH",
    "D",
]

ignore = [
    "D107",  # Missing docstring in __init__ — class docstring suffices.
]

unfixable = [
    "B",
    "F841",
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**" = [
    "D",
    "N999",
]

[lint.pydocstyle]
convention = "google"

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
